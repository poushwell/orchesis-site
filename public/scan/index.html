    :root {

    .input-panel { padding: 18px; }
    .input-top {

      align-items: stretch;

      text-align: center;

      border: 1px solid transparent;

      letter-spacing: 0.2px;

    function setError(message) {
      errorBox.textContent = message || "";
      errorBox.style.display = message ? "block" : "none";
    }

    function severityBadgeClass(label) {
      if (label === "CRITICAL") return "pill-critical";
      if (label === "HIGH") return "pill-high";
      if (label === "MEDIUM") return "pill-medium";
      if (label === "LOW") return "pill-low";
      return "pill-info";
    }

    function animateScore(target, color) {
      const start = Number(scoreValue.textContent) || 0;
      const diff = target - start;
      const duration = 700;
      const started = performance.now();
      function tick(now) {
        const p = Math.min(1, (now - started) / duration);
        const eased = 1 - Math.pow(1 - p, 3);
        scoreValue.textContent = String(Math.round(start + diff * eased));
        if (p < 1) {
          requestAnimationFrame(tick);
        }
      }
      scoreRing.style.borderColor = color;
      requestAnimationFrame(tick);
    }

    function shareGrade(score) {
      if (score >= 80) return "STRONG";
      if (score >= 50) return "FAIR";
      return "RISKY";
    }

    function generateShareCard(score, grade, findingsCount) {
      const canvas = document.createElement("canvas");
      canvas.width = 1200;
      canvas.height = 630;
      const ctx = canvas.getContext("2d");
      if (!ctx) return "";

      ctx.fillStyle = "#0f172a";
      ctx.fillRect(0, 0, 1200, 630);

      const centerX = 600;
      const centerY = 250;
      const radius = 120;
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.strokeStyle = score >= 80 ? "#22c55e" : score >= 50 ? "#eab308" : "#ef4444";
      ctx.lineWidth = 12;
      ctx.stroke();

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 72px system-ui";
      ctx.textAlign = "center";
      ctx.fillText(score + "/100", centerX, centerY + 25);

      ctx.font = "bold 36px system-ui";
      ctx.fillStyle = score >= 80 ? "#22c55e" : score >= 50 ? "#eab308" : "#ef4444";
      ctx.fillText(grade, centerX, centerY + 75);

      ctx.fillStyle = "#94a3b8";
      ctx.font = "28px system-ui";
      ctx.fillText("MCP Security Score", centerX, 100);

      ctx.fillStyle = "#64748b";
      ctx.font = "24px system-ui";
      ctx.fillText(findingsCount + " findings detected", centerX, 450);

      ctx.fillStyle = "#475569";
      ctx.font = "20px system-ui";
      ctx.fillText("Scanned with Orchesis — poushwell.github.io/orchesis", centerX, 580);

      return canvas.toDataURL("image/png");
    }

    function renderSummary(summary) {
      summaryBar.innerHTML = "";
      const entries = [
        ["CRITICAL", summary.CRITICAL || 0],
        ["HIGH", summary.HIGH || 0],
        ["MEDIUM", summary.MEDIUM || 0],
        ["LOW", summary.LOW || 0],
        ["INFO", summary.INFO || 0]
      ];
      entries.forEach(([label, count]) => {
        const el = document.createElement("span");
        el.className = `pill ${severityBadgeClass(label)}`;
        el.textContent = `${count} ${label}`;
        summaryBar.appendChild(el);
      });
    }

    function renderFindings(findings) {
      findingsList.innerHTML = "";
      if (!findings.length) {
        const box = document.createElement("div");
        box.className = "finding open";
        box.innerHTML = `
          <button class="finding-head" type="button">
            <span class="finding-title"><span class="badge pill-info">INFO</span> No findings</span>
            <span>Safe baseline</span>
          </button>
          <div class="finding-body" style="display:block;">
            No obvious issues were detected in this config.
          </div>
        `;
        findingsList.appendChild(box);
        return;
      }

      findings.forEach((finding) => {
        const wrapper = document.createElement("div");
        wrapper.className = "finding";
        const label = finding.severity.label;
        wrapper.innerHTML = `
          <button class="finding-head" type="button">
            <span class="finding-title">
              <span class="badge ${severityBadgeClass(label)}">${label}</span>
              ${finding.title}
            </span>
            <span>Details</span>
          </button>
          <div class="finding-body">
            <div>${finding.description}</div>
            <small><strong>Remediation:</strong> ${finding.remediation}</small>
          </div>
        `;
        const head = wrapper.querySelector(".finding-head");
        head.addEventListener("click", () => {
          wrapper.classList.toggle("open");
        });
        findingsList.appendChild(wrapper);
      });
    }

    function scanNow() {
      setError("");
      const text = input.value.trim();
      if (!text) {
        setError("Paste MCP config JSON first.");
        return;
      }

      const result = scanner.scan(text);
      if (result.score === 0 && result.findings.length === 1 && result.findings[0].title === "Invalid JSON") {
        setError(result.findings[0].description);
        return;
      }

      results.style.display = "block";
      animateScore(result.score, result.grade.color);
      scoreLetter.textContent = `Grade ${result.grade.letter} - ${result.grade.label}`;
      scoreLabel.textContent = `Scanned at ${new Date(result.scannedAt).toLocaleString()}`;
      renderSummary(result.summary);
      renderFindings(result.findings);
      results.scrollIntoView({ behavior: "smooth", block: "start" });
      shareSection.style.display = "block";
      shareFeedback.textContent = "";

      const score = result.score;
      const grade = shareGrade(score);
      const count = result.findings.length;

      copyBtn.onclick = async () => {
        const text = `My MCP Security Score: ${score}/100 (${grade}) — ${count} findings. Scan yours free: https://poushwell.github.io/orchesis/`;
        try {
          await navigator.clipboard.writeText(text);
          shareFeedback.textContent = "Copied!";
        } catch (err) {
          shareFeedback.textContent = "Clipboard unavailable in this browser.";
        }
      };

      downloadBtn.onclick = () => {
        const dataUrl = generateShareCard(score, grade, count);
        if (!dataUrl) {
          shareFeedback.textContent = "Could not generate share card.";
          return;
        }
        const link = document.createElement("a");
        link.download = "mcp-security-score.png";
        link.href = dataUrl;
        link.click();
      };

      tweetBtn.onclick = () => {
        const text = encodeURIComponent(`My MCP Security Score: ${score}/100 🛡️\n\nScan yours free:`);
        const url = encodeURIComponent("https://poushwell.github.io/orchesis/");
        window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, "_blank", "noopener");
      };
    }

    scanBtn.addEventListener("click", scanNow);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && event.ctrlKey) {
        event.preventDefault();
        scanNow();
      }
    });

    document.getElementById("loadVulnBtn").addEventListener("click", () => {
      input.value = JSON.stringify(EXAMPLES.vulnerable, null, 2);
      setError("");
    });
    document.getElementById("loadSecureBtn").addEventListener("click", () => {
      input.value = JSON.stringify(EXAMPLES.secure, null, 2);
      setError("");
    });
    document.getElementById("loadModerateBtn").addEventListener("click", () => {
      input.value = JSON.stringify(EXAMPLES.moderate, null, 2);
      setError("");
    });
  </script>
</body>
</html>
